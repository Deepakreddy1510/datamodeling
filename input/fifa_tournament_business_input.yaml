business_rules:
  - Competition end date should be on or after competition start date.
  - Match date should fall within the competition start and end date.
  - Home team and away team should not be the same team.
  - Match scores should be zero or positive.
  - Attendance count should not exceed venue seating capacity.
  - Ticket price should be greater than zero.
  - Tickets sold should be zero or positive.
  - Ticket sale amount should equal tickets sold multiplied by ticket price.
  - Match event minute should be between 0 and 130.
  - Broadcast viewer count should be zero or positive.
  - Broadcast revenue amount should be zero or positive.
  - Sponsorship contract amount should be greater than zero.
  - Sponsorship end date should be on or after sponsorship start date.
  - Status fields should use realistic business status values.

reporting_requirements:
  - report_name: Match Results Report
    description: Show match date, stage, teams, scores, venue, attendance, and match status.

  - report_name: Team Performance Report
    description: Show matches played, wins, losses, draws, goals scored, goals conceded, and points by team.

  - report_name: Player Event Report
    description: Show player goals, cards, fouls, substitutions, and event involvement.

  - report_name: Venue Utilization Report
    description: Show matches hosted, attendance, capacity usage, and match revenue by venue.

  - report_name: Ticket Sales Report
    description: Show tickets sold, ticket category, ticket revenue, and match-level sales performance.

  - report_name: Broadcast Viewership Report
    description: Show viewer count and broadcast revenue by broadcaster, region, and match.

  - report_name: Sponsorship Revenue Report
    description: Show sponsor contract value, sponsor category, competition, and sponsorship status.

  - report_name: Tournament Revenue Report
    description: Show combined ticket, broadcast, sponsorship, and match revenue by competition.

synthetic_data_requirements:
  rows_per_table: 10
  value_quality_rules:
    - Generate realistic football tournament, team, player, venue, broadcaster, and sponsor names.
    - Do not generate placeholder names such as Team 001, Player 001, Venue 001, Match 001, Sponsor 001, or Broadcaster 001.
    - Use realistic football countries, player positions, match stages, ticket categories, and event types.
    - Keep competition, team, player, venue, match, ticket, broadcast, and sponsorship IDs consistent across related tables.
    - Keep match dates within the competition date range.
    - Keep ticket sale dates and broadcast viewership dates aligned with match dates.
    - Keep sponsorship dates within or around the competition period.
    - Avoid one-to-one patterns between master and transaction tables.
    - Clearly treat generated records as synthetic demonstration data.
