synthetic_data_requirements:
  realism_level: high
  locale: en_US

  date_range:
    start_date: "2024-01-01"
    end_date: "2026-12-31"

  consistency_rules:
    competition:
      end_date_should_be_after_start_date: true

    team:
      team_country_should_match_confederation: true
      is_active_should_be_boolean: true

    player:
      player_team_should_exist: true
      jersey_number_should_be_between_1_and_99: true
      is_active_should_be_boolean: true

    venue:
      capacity_should_be_positive: true
      venue_city_should_match_country: true

    match:
      match_date_should_be_within_competition_dates: true
      home_team_and_away_team_should_be_different: true
      attendance_should_not_exceed_venue_capacity: true
      scores_should_be_non_negative: true

    match_squad:
      player_should_belong_to_match_team: true
      minutes_played_should_be_between_0_and_120: true
      starting_eleven_flag_should_be_boolean: true
      captain_flag_should_be_boolean: true

    match_event:
      event_minute_should_be_between_0_and_120: true
      event_player_should_belong_to_match_team: true

    ticket_sale:
      sale_amount_should_equal_tickets_sold_times_ticket_price: true
      sale_date_should_be_on_or_before_match_date: true

    broadcast:
      viewers_count_should_be_positive: true
      broadcast_revenue_should_be_positive: true

    sponsorship:
      contract_amount_should_be_positive: true
      end_date_should_be_after_start_date: true
      is_active_should_be_boolean: true

    relationships:
      enforce_primary_keys: true
      enforce_foreign_keys: true
      enforce_unique_constraints: true
      enforce_check_constraints: true

