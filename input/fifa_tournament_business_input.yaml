business_name: FIFA Football Tournament Analytics

business_type: Football Tournament Operations and Match Analytics

target_database: PostgreSQL

business_description: >
  FIFA Football Tournament Analytics is a football tournament reporting use case
  where teams participate in scheduled matches across stadium venues. Players belong
  to teams, match events are recorded during games, tickets are sold for matches,
  broadcasters track audience engagement, and sponsors support the tournament.
  The business wants to analyze match results, team performance, player activity,
  venue utilization, ticket revenue, broadcast viewership, and sponsorship value.

model_purpose: >
  Create a PostgreSQL analytical data model that helps tournament organizers analyze
  football matches, teams, players, venues, match events, ticket sales, broadcast
  viewership, and sponsorship revenue. The model should support business reporting,
  operational analysis, and synthetic data generation for testing.

main_business_processes:
  - Tournament setup and competition tracking
  - Team registration and team profile management
  - Player registration and squad ownership
  - Venue scheduling and match allocation
  - Match scheduling and result tracking
  - Match event recording
  - Ticket sales and attendance tracking
  - Broadcast viewership tracking
  - Sponsorship revenue tracking
  - Team and player performance analysis

key_business_entities:
  - entity_name: Competition
    description: A football tournament or season where teams compete.

  - entity_name: Team
    description: A football team participating in the competition.

  - entity_name: Player
    description: A football player registered with a team.

  - entity_name: Venue
    description: A stadium where tournament matches are played.

  - entity_name: Match
    description: A scheduled football game between two teams.

  - entity_name: Match Event
    description: A football event recorded during a match such as goal, card, foul, or substitution.

  - entity_name: Ticket Sale
    description: Ticket sales and attendance information for a match.

  - entity_name: Broadcast Viewership
    description: Broadcast audience and revenue information for a match.

  - entity_name: Sponsorship
    description: Sponsorship agreement and revenue information for the competition.

business_relationships:
  - relationship_name: Competition has Teams
    description: One competition can have many teams.

  - relationship_name: Competition has Matches
    description: One competition can have many matches.

  - relationship_name: Team has Players
    description: One team can have many players.

  - relationship_name: Venue hosts Matches
    description: One venue can host many matches.

  - relationship_name: Match has Home Team
    description: Each match has one home team.

  - relationship_name: Match has Away Team
    description: Each match has one away team.

  - relationship_name: Match contains Match Events
    description: One match can have many match events.

  - relationship_name: Team is linked to Match Events
    description: A match event can be linked to the team involved in the event.

  - relationship_name: Player is linked to Match Events
    description: A match event can be linked to a player when applicable.

  - relationship_name: Match has Ticket Sales
    description: One match can have ticket sales and attendance information.

  - relationship_name: Match has Broadcast Viewership
    description: One match can have broadcast viewership records.

  - relationship_name: Competition has Sponsorships
    description: One competition can have many sponsorship records.

entity_attributes:
  Competition:
    - competition_id
    - competition_name
    - season_year
    - host_country
    - start_date
    - end_date
    - competition_status

  Team:
    - team_id
    - competition_id
    - team_name
    - country
    - coach_name
    - group_name
    - team_status

  Player:
    - player_id
    - team_id
    - player_name
    - position
    - jersey_number
    - nationality
    - player_status

  Venue:
    - venue_id
    - venue_name
    - city
    - country
    - seating_capacity
    - venue_status

  Match:
    - match_id
    - competition_id
    - venue_id
    - home_team_id
    - away_team_id
    - match_date
    - match_stage
    - match_status
    - home_score
    - away_score
    - attendance_count
    - match_revenue_amount

  Match Event:
    - event_id
    - match_id
    - team_id
    - player_id
    - event_type
    - event_minute
    - event_description

  Ticket Sale:
    - ticket_sale_id
    - match_id
    - ticket_category
    - tickets_sold
    - ticket_price
    - sale_amount
    - sale_date

  Broadcast Viewership:
    - broadcast_id
    - match_id
    - broadcaster_name
    - broadcast_region
    - viewer_count
    - broadcast_revenue_amount
    - viewership_date

  Sponsorship:
    - sponsorship_id
    - competition_id
    - sponsor_name
    - sponsor_category
    - contract_amount
    - start_date
    - end_date
    - sponsorship_status

business_rules:
  - Competition end date should be on or after competition start date.
  - Match date should fall within the competition start and end date.
  - Home team and away team should not be the same team.
  - Match scores should be zero or positive.
  - Attendance count should not exceed venue seating capacity.
  - Ticket price should be greater than zero.
  - Tickets sold should be zero or positive.
  - Ticket sale amount should equal tickets sold multiplied by ticket price.
  - Match event minute should be between 0 and 130.
  - Broadcast viewer count should be zero or positive.
  - Broadcast revenue amount should be zero or positive.
  - Sponsorship contract amount should be greater than zero.
  - Sponsorship end date should be on or after sponsorship start date.
  - Status fields should use realistic business status values.

reporting_requirements:
  - report_name: Match Results Report
    description: Show match date, stage, teams, scores, venue, attendance, and match status.

  - report_name: Team Performance Report
    description: Show matches played, wins, losses, draws, goals scored, goals conceded, and points by team.

  - report_name: Player Event Report
    description: Show player goals, cards, fouls, substitutions, and event involvement.

  - report_name: Venue Utilization Report
    description: Show matches hosted, attendance, capacity usage, and match revenue by venue.

  - report_name: Ticket Sales Report
    description: Show tickets sold, ticket category, ticket revenue, and match-level sales performance.

  - report_name: Broadcast Viewership Report
    description: Show viewer count and broadcast revenue by broadcaster, region, and match.

  - report_name: Sponsorship Revenue Report
    description: Show sponsor contract value, sponsor category, competition, and sponsorship status.

  - report_name: Tournament Revenue Report
    description: Show combined ticket, broadcast, sponsorship, and match revenue by competition.

synthetic_data_requirements:
  rows_per_table: 10
  value_quality_rules:
    - Generate realistic football tournament, team, player, venue, broadcaster, and sponsor names.
    - Do not generate placeholder names such as Team 001, Player 001, Venue 001, Match 001, Sponsor 001, or Broadcaster 001.
    - Use realistic football countries, player positions, match stages, ticket categories, and event types.
    - Keep competition, team, player, venue, match, ticket, broadcast, and sponsorship IDs consistent across related tables.
    - Keep match dates within the competition date range.
    - Keep ticket sale dates and broadcast viewership dates aligned with match dates.
    - Keep sponsorship dates within or around the competition period.
    - Avoid one-to-one patterns between master and transaction tables.
    - Clearly treat generated records as synthetic demonstration data.

expected_output:
  - Conceptual data model
  - Logical data model
  - Physical PostgreSQL data model
  - SQL DDL scripts
  - Table relationships
  - Business rules and constraints
  - Fact and dimension design
  - Synthetic data generation support
  - Excel output with sample synthetic data
  - PostgreSQL loading support
