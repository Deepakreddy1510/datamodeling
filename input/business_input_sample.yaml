business_name: Sample Retail Analytics
business_type: Retail
business_description: A retailer wants to model sales, customers, products, stores, and reporting needs.
model_purpose: Create a data model that supports operational reporting and analytics.
main_business_processes:
  - Customer registration
  - Product catalog management
  - Store sales
  - Returns processing
key_business_entities:
  - Customer
  - Product
  - Store
  - SalesOrder
  - SalesOrderLine
  - Return
business_relationships:
  - Customer places many SalesOrders.
  - SalesOrder contains many SalesOrderLines.
  - Product appears in many SalesOrderLines.
  - Store fulfills many SalesOrders.
entity_attributes:
  Customer:
    - customer_id
    - customer_name
    - email
  Product:
    - product_id
    - product_name
    - category
  Store:
    - store_id
    - store_name
    - region
  SalesOrder:
    - order_id
    - customer_id
    - store_id
    - order_date
  SalesOrderLine:
    - order_line_id
    - order_id
    - product_id
    - quantity
    - unit_price
reporting_requirements:
  - Sales by store, product, and month.
  - Return rate by product category.
expected_output:
  - Business Input Summary
  - Conceptual Data Model
  - Logical Data Model
  - Physical Data Model
  - SQL DDL
  - Data Dictionary
target_database: PostgreSQL
