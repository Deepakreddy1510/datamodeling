analytics_modeling:
  recommended_starting_model: Start with demand and revenue model first, then add inventory planning support.
  do_not_overclaim: Do not claim complete inventory forecasting from Amazon VAT data alone.
  dimension_candidates:
  - dim_product
  - dim_date
  - dim_marketplace_channel
  - dim_customer_geography
  - dim_supplier_replenishment_rule
  - dim_promotion
  - dim_event
  bridge_candidates:
  - bridge_promotion_product
  fact_candidates:
  - fact_daily_demand
  - fact_inventory_planning_position
  - fact_reorder_planning_recommendation
  derived_metrics:
  - net_units = sold_units - return_or_refund_units
  - avg_monthly_units = annual_net_units / active_months
  - days_of_cover = available_stock / average_daily_demand
  - lead_time_demand = average_daily_demand * lead_time_days
  - recommended_order_quantity_raw = target_stock_units - available_stock
  - recommended_order_quantity_final = adjusted to minimum_order_quantity and order_multiple
reporting_requirements:
- Top selling SKUs and ASINs by units and revenue.
- Monthly and quarterly sales and revenue trend.
- Demand trend by product, marketplace, sales channel, and customer geography.
- Refund/return impact by SKU and ASIN where transaction type is available.
- Fast-moving, medium-moving, slow-moving, and very slow-moving product classification.
- Products with low stock or watch status based on available stock and Amazon demand velocity.
- Estimated days of cover by product using available stock and average demand.
- Products that may require reorder planning based on demand, lead time, reorder point, and target stock.
- Promotional impact analysis using promotion assumptions and actual Amazon demand.
- Event and seasonality impact analysis around Prime Day, Black Friday, Cyber Monday, Christmas, and UK bank holidays.
- Clear separation of real factual Amazon data, derived demand profile, and assumption files in all reports.
data_quality_requirements:
- Identify and exclude or deduplicate duplicate May file.
- Flag missing October file as a data gap.
- Standardize schema across monthly Amazon files.
- Fill unavailable columns as NULL when months have reduced schema.
- Standardize text casing for city, country, marketplace, and channel values.
- Keep source_file_name, load_batch_id, and load_created_at for traceability.
- Clearly tag assumption files with assumption_basis where applicable.
- Validate that all assumption SKU and ASIN combinations exist in the real Amazon data.
expected_output:
- Business Input Summary
- Source Data Understanding
- Staging Model
- Conceptual Data Model
- Logical Data Model
- Physical Data Model
- Dimension and Fact Recommendations
- Bridge Table Recommendations
- Business Relationships
- Data Quality Rules
- SQL DDL
- Data Dictionary
- Reporting Layer Recommendations
- Assumptions and Limitations
assumptions_and_limitations:
- Amazon VAT transaction files are the primary factual source.
- Supporting inventory, supplier, event, and promotion files are assumption/reference files.
- The model can support demand intelligence and inventory planning support, not full operational inventory forecasting unless
  more real inventory data is provided.
- Real stock-on-hand, purchase orders, supplier contracts, warehouse stock, stock movement logs, and actual promotion calendars
  should replace assumptions if provided later.
- October 2025 is missing from the Amazon monthly transaction files and must be handled as a data gap.
