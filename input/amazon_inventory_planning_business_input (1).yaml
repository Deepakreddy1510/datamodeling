business_name: Amazon Marketplace Demand and Inventory Planning Analytics
business_type: E-commerce marketplace sales, revenue, demand forecasting, and inventory planning support
business_description: The business wants to analyse one year of Amazon marketplace transaction data and use it as the factual
  base for sales demand understanding, revenue trend analysis, refund/return impact analysis, marketplace/channel performance,
  and inventory planning support. The Amazon data is factual transaction data, while a small set of supporting assumption
  files is added only for missing inventory planning inputs such as current stock, supplier lead time, minimum order quantity,
  order multiple, purchase cost, events, and promotions.
model_purpose: Create a data model that starts from raw Amazon monthly transaction files, profiles and stages the data, then
  supports demand analytics, revenue analytics, product movement analysis, return/refund impact analysis, and inventory planning
  support. The model should not overclaim full inventory forecasting unless real inventory, purchase order, supplier, warehouse,
  and replenishment source files are provided.
target_database: PostgreSQL
target_schema: amazon_inventory_planning_analytics
important_modeling_instruction: Use the Amazon monthly transaction files as the primary factual source. Supporting assumption
  files must be clearly labelled as assumptions and should not be treated as real operational inventory or supplier data.
  Do not create large synthetic inventory movement, purchase order, batch, stockout, or snapshot datasets unless real source
  files are provided. Start with a small relational model and then expand only if the available data supports it.
source_data:
  reporting_period: Calendar year 2025 with available Amazon monthly files
  source_nature: Amazon VAT transaction reports plus small supporting inventory planning assumption files
  primary_real_data_source: Amazon monthly VAT transaction CSV files
  supporting_assumption_data_used: true
  data_quality_notes:
  - October 2025 Amazon transaction file is missing from the provided ZIP.
  - May 2025 appears twice; only one May file should be used to avoid double counting.
  - Some monthly files have different column structures, so staging must standardize the schema.
  - Jun, Nov, and Dec files have reduced detail compared with other months.
  - Amazon files provide strong sales, demand, product, marketplace, channel, and refund/return signals.
  - Amazon files do not directly provide complete stock-on-hand, supplier lead time, reorder policy, purchase order, or warehouse
    inventory data.
  real_input_files:
  - file_name: Amazon VAT Transactions Report Jan 2025.csv
    file_type: Amazon monthly transaction CSV
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized Amazon transaction staging table.
  - file_name: Amazon VAT Transactions Report Feb 2025.csv
    file_type: Amazon monthly transaction CSV
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized Amazon transaction staging table.
  - file_name: Amazon VAT Transactions Report Mar 2025.csv
    file_type: Amazon monthly transaction CSV
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized Amazon transaction staging table.
  - file_name: Amazon VAT Transactions Report APR 2025.csv
    file_type: Amazon monthly transaction CSV
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized Amazon transaction staging table.
  - file_name: Amazon VAT Transactions Report MAY 2025.csv
    file_type: Amazon monthly transaction CSV
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load one May file only.
  - file_name: Amazon VAT Transactions Report MAY 2025 (1).csv
    file_type: Duplicate Amazon monthly transaction CSV
    staging_table: do_not_load
    load_instruction: Do not load unless deduplication confirms unique records.
  - file_name: Amazon VAT Transactions Report Jun 2025.csv
    file_type: Amazon monthly transaction CSV with reduced schema
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized staging table with missing columns filled as NULL.
  - file_name: Amazon VAT Transactions Report Jul 2025.csv
    file_type: Amazon monthly transaction CSV
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized Amazon transaction staging table.
  - file_name: Amazon VAT Transactions Report Aug 2025.csv
    file_type: Amazon monthly transaction CSV
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized Amazon transaction staging table.
  - file_name: Amazon VAT Transactions Report Sep 2025.csv
    file_type: Amazon monthly transaction CSV
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized Amazon transaction staging table.
  - file_name: Amazon VAT Transactions Report Nov 2025.csv
    file_type: Amazon monthly transaction CSV with reduced schema
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized staging table with missing columns filled as NULL.
  - file_name: Amazon VAT Transactions Report Dec 2025.csv
    file_type: Amazon monthly transaction CSV with reduced schema
    staging_table: stg_amazon_vat_transactions
    load_instruction: Load into standardized staging table with missing columns filled as NULL.
  derived_and_assumption_files:
  - file_name: amazon_product_demand_profile_from_real_data.csv
    data_nature: Derived from real Amazon transaction data
    staging_table: stg_amazon_product_demand_profile
    purpose: Product-level demand velocity profile based on real SKU and ASIN combinations.
  - file_name: product_inventory_assumption.csv
    data_nature: Supporting assumption file
    staging_table: stg_product_inventory_assumption
    purpose: Adds assumed current stock, reserved stock, damaged stock, and available stock for real Amazon SKUs.
  - file_name: supplier_replenishment_assumption.csv
    data_nature: Supporting assumption file
    staging_table: stg_supplier_replenishment_assumption
    purpose: Adds assumed supplier lead time, MOQ, order multiple, purchase cost, reorder point, and target stock for real
      Amazon SKUs.
  - file_name: event_calendar_assumption.csv
    data_nature: Reference assumption file
    staging_table: stg_event_calendar
    purpose: Adds UK/Amazon seasonal events such as Prime Day, Black Friday, Cyber Monday, Christmas, Boxing Day, and bank
      holidays.
  - file_name: promotion_master_assumption.csv
    data_nature: Supporting assumption file
    staging_table: stg_promotion_master_assumption
    purpose: Adds planned and historical promotion campaign headers.
  - file_name: promotion_items_assumption.csv
    data_nature: Supporting assumption file
    staging_table: stg_promotion_items_assumption
    purpose: Maps promotions to real Amazon SKU and ASIN combinations.
main_business_processes:
- process_name: Amazon Sales Demand Analysis
  description: Analyse units sold, net units, demand velocity, and product movement by SKU, ASIN, product, month, marketplace,
    and sales channel.
  key_data_used:
  - SELLER_SKU
  - ASIN
  - ITEM_DESCRIPTION
  - QTY
  - TRANSACTION_TYPE
  - ACTIVITY_PERIOD
- process_name: Revenue Trend Analysis
  description: Analyse sales amount, VAT-inclusive and VAT-exclusive values, revenue trends, seasonal changes, and quarterly
    performance.
  key_data_used:
  - TOTAL_ACTIVITY_VALUE_AMT_VAT_INCL
  - TOTAL_ACTIVITY_VALUE_AMT_VAT_EXCL
  - ACTIVITY_PERIOD
  - MARKETPLACE
  - SALES_CHANNEL
- process_name: Refund and Return Impact Analysis
  description: Identify refunded or returned units and adjust demand and revenue where transaction type information is available.
  key_data_used:
  - TRANSACTION_TYPE
  - QTY
  - TOTAL_ACTIVITY_VALUE_AMT_VAT_INCL
  - SELLER_SKU
  - ASIN
- process_name: Marketplace and Channel Analysis
  description: Compare Amazon marketplaces and fulfilment channels such as MFN and AFN where available.
  key_data_used:
  - MARKETPLACE
  - SALES_CHANNEL
  - SELLER_SKU
  - ASIN
- process_name: Customer Destination Geography Analysis
  description: Analyse demand by arrival country, city, and post code where available.
  key_data_used:
  - ARRIVAL_COUNTRY
  - ARRIVAL_CITY
  - ARRIVAL_POST_CODE
- process_name: Inventory Planning Support
  description: Use Amazon demand velocity with supporting stock and replenishment assumptions to identify low stock, watchlist
    SKUs, overstock risk, and reorder planning candidates.
  key_data_used:
  - available_stock
  - avg_monthly_units_from_amazon
  - lead_time_days
  - minimum_order_quantity
  - order_multiple
  - reorder_point_units
  - target_stock_units
- process_name: Promotion and Event Impact Support
  description: Use event and promotion assumption files to explain demand spikes and support planned promotion inventory preparation.
  key_data_used:
  - event_date
  - event_name
  - promotion_id
  - expected_demand_lift_percent
  - sku_code
  - asin
staging_requirements:
  schema_name: amazon_inventory_planning_analytics
  table_prefix: stg_
  keep_staging_in_same_schema: true
  staging_tables_required:
  - table_name: stg_amazon_vat_transactions
    source_file_type: Amazon monthly VAT transaction files
    grain: One row per raw Amazon VAT transaction line after schema standardization
    required_columns:
    - source_file_name
    - source_month
    - transaction_event_id
    - activity_transaction_id
    - transaction_type
    - activity_period
    - tax_calculation_date
    - transaction_complete_date
    - seller_sku
    - asin
    - item_description
    - qty
    - total_activity_value_amt_vat_excl
    - total_activity_value_amt_vat_incl
    - marketplace
    - sales_channel
    - arrival_city
    - arrival_country
    - arrival_post_code
    - load_batch_id
    - load_created_at
    data_quality_rules:
    - Do not double-load duplicate May file.
    - Fill missing columns as NULL for reduced-schema months.
    - Standardize city and country casing.
    - Standardize transaction type values.
    - Preserve source file name and load batch ID.
  - table_name: stg_amazon_product_demand_profile
    source_file_type: Derived product demand profile
    grain: One row per SKU and ASIN combination derived from Amazon data
    required_columns:
    - sku_code
    - asin
    - item_description
    - inferred_category
    - months_active
    - annual_sale_units
    - annual_refund_return_units
    - annual_net_units
    - annual_net_revenue
    - avg_monthly_units
    - avg_unit_price
    - sales_velocity_band
    - primary_marketplace
    - primary_sales_channel
  - table_name: stg_product_inventory_assumption
    source_file_type: Supporting inventory assumption file
    grain: One row per real Amazon SKU and ASIN combination
    required_columns:
    - sku_code
    - asin
    - item_description
    - inferred_category
    - stock_date
    - current_stock
    - reserved_stock
    - damaged_stock
    - available_stock
    - avg_monthly_units_from_amazon
    - sales_velocity_band
    - inventory_status
  - table_name: stg_supplier_replenishment_assumption
    source_file_type: Supporting replenishment assumption file
    grain: One row per real Amazon SKU and ASIN combination
    required_columns:
    - sku_code
    - asin
    - supplier_name
    - lead_time_days
    - minimum_order_quantity
    - order_multiple
    - purchase_cost
    - reorder_point_units
    - target_stock_units
    - service_level_target
    - supplier_status
  - table_name: stg_event_calendar
    source_file_type: Event calendar assumption/reference file
    grain: One row per event date and event name
    required_columns:
    - event_date
    - event_name
    - event_type
    - country
    - region
    - demand_impact_level
    - assumption_note
  - table_name: stg_promotion_master_assumption
    source_file_type: Promotion master assumption file
    grain: One row per promotion campaign
    required_columns:
    - promotion_id
    - promotion_name
    - promotion_type
    - start_date
    - end_date
    - discount_type
    - discount_value
    - marketplace
    - sales_channel
    - promotion_status
    - expected_demand_impact_level
  - table_name: stg_promotion_items_assumption
    source_file_type: Promotion item assumption file
    grain: One row per promotion and SKU/ASIN combination
    required_columns:
    - promotion_id
    - sku_code
    - asin
    - item_description
    - inferred_category
    - expected_demand_lift_percent
    - promo_priority
key_business_entities:
- entity_name: Amazon VAT Transaction
  entity_type: Primary factual raw transaction source
  physical_table_recommendation: stg_amazon_vat_transactions
  grain: One row per Amazon VAT transaction line
  business_key: transaction_event_id + activity_transaction_id + seller_sku + asin
  metrics:
  - qty
  - total_activity_value_amt_vat_excl
  - total_activity_value_amt_vat_incl
- entity_name: Product
  entity_type: Dimension candidate
  physical_table_recommendation: dim_product
  grain: One row per SKU and ASIN combination
  business_key: sku_code + asin
- entity_name: Date
  entity_type: Dimension candidate
  physical_table_recommendation: dim_date
  grain: One row per calendar date
  business_key: full_date
- entity_name: Marketplace Channel
  entity_type: Dimension candidate
  physical_table_recommendation: dim_marketplace_channel
  grain: One row per marketplace and sales channel combination
  business_key: marketplace + sales_channel
- entity_name: Customer Geography
  entity_type: Dimension candidate
  physical_table_recommendation: dim_customer_geography
  grain: One row per country, city, and post code combination
  business_key: arrival_country + arrival_city + arrival_post_code
- entity_name: Inventory Assumption
  entity_type: Supporting planning input
  physical_table_recommendation: stg_product_inventory_assumption
  grain: One row per SKU and ASIN stock assumption date
  business_key: sku_code + asin + stock_date
- entity_name: Supplier Replenishment Rule
  entity_type: Dimension or rule reference candidate
  physical_table_recommendation: dim_supplier_replenishment_rule
  grain: One row per SKU and ASIN supplier rule
  business_key: sku_code + asin + supplier_name
- entity_name: Promotion
  entity_type: Dimension candidate
  physical_table_recommendation: dim_promotion
  grain: One row per promotion campaign
  business_key: promotion_id
- entity_name: Promotion Item
  entity_type: Bridge table candidate
  physical_table_recommendation: bridge_promotion_product
  grain: One row per promotion, SKU, and ASIN combination
  business_key: promotion_id + sku_code + asin
- entity_name: Event Calendar
  entity_type: Dimension candidate
  physical_table_recommendation: dim_event
  grain: One row per event date and event name
  business_key: event_date + event_name
- entity_name: Daily Demand
  entity_type: Primary analytics fact candidate
  physical_table_recommendation: fact_daily_demand
  grain: One row per date, SKU, ASIN, marketplace, and sales channel
  metrics:
  - units_sold
  - return_units
  - net_units
  - gross_revenue
  - net_revenue
  - transaction_count
- entity_name: Inventory Planning Position
  entity_type: Planning support fact candidate
  physical_table_recommendation: fact_inventory_planning_position
  grain: One row per SKU, ASIN, and stock date
  metrics:
  - current_stock
  - available_stock
  - reserved_stock
  - damaged_stock
  - avg_monthly_units
  - days_of_cover
- entity_name: Reorder Planning Recommendation
  entity_type: Derived output fact candidate
  physical_table_recommendation: fact_reorder_planning_recommendation
  grain: One row per recommendation date, SKU, ASIN, and supplier
  metrics:
  - available_stock
  - forecast_lead_time_demand
  - reorder_point_units
  - target_stock_units
  - recommended_order_quantity
business_relationships:
- Amazon VAT Transaction references Product using SELLER_SKU and ASIN.
- Amazon VAT Transaction references Date using transaction or activity date fields.
- Amazon VAT Transaction references Marketplace Channel using MARKETPLACE and SALES_CHANNEL.
- Amazon VAT Transaction references Customer Geography using ARRIVAL_COUNTRY, ARRIVAL_CITY, and ARRIVAL_POST_CODE.
- Product Inventory Assumption references Product using sku_code and asin.
- Supplier Replenishment Assumption references Product using sku_code and asin.
- Promotion Item references Promotion using promotion_id.
- Promotion Item references Product using sku_code and asin.
- Event Calendar links to demand facts by date and country or region context.
- Daily Demand fact is derived from Amazon transactions after cleaning, standardization, deduplication, and return/refund
  adjustment.
- Inventory Planning Position fact combines product demand profile and inventory assumption data.
- Reorder Planning Recommendation fact is derived from demand, stock assumptions, and supplier replenishment assumptions.
