  - therapeutic_area
  - dosage_form
  - route_of_administration
  - current_development_stage
  - development_status
  - development_start_date
  Development Assessment:
  - assessment_id
  - drug_id
  - assessment_type
  - assessment_name
  - clinical_phase
  - animal_species
  - assessment_status
  - start_date
  - completion_date
  - assessment_result
  - safety_result
  - effectiveness_result
  - finding
  - risk_level
  - participant_count
  - mandatory_flag
  Regulatory Record:
  - regulatory_record_id
  - drug_id
  - regulator_name
  - record_type
  - submission_type
  - submission_date
  - review_status
  - decision_date
  - decision_result
  - licence_status
  - licence_grant_date
  - licence_expiry_date
