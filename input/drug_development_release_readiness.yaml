business_name: Drug Development and Release Readiness
business_type: Pharmaceutical Research and Drug Lifecycle Management
target_database: PostgreSQL
business_description: 'The business develops drug candidates and tracks their progress
  through laboratory testing, animal studies, clinical trials, regulatory review,
  marketing licence approval, patent protection, risk assessment, and market release.

  '
model_purpose: 'Create a data model that helps the business understand the current
  development stage of each drug, completed and pending tests, safety and effectiveness
  results, regulatory approval, licence status, patent status, overall risk, and market
  release readiness.

  '
main_business_processes:
- Pharmaceutical company and drug candidate management
- Laboratory and preclinical testing
- Animal study tracking
- Clinical trial tracking
- Safety and effectiveness assessment
- Drug risk assessment
- Regulatory submission and approval tracking
- Marketing licence tracking
- Patent tracking
- Market release decision
key_business_entities:
- entity_name: Pharmaceutical Company
  description: A company that develops or owns a drug candidate.
- entity_name: Drug Candidate
  description: A medicine or active substance being developed for a target condition.
- entity_name: Development Assessment
  description: A laboratory test, animal study, clinical trial, or safety assessment
    performed for a drug.
- entity_name: Regulatory Record
  description: Regulatory submission, approval, and marketing licence information
    for a drug.
- entity_name: Patent
  description: Patent ownership, authority, status, and expiry information related
    to a drug.
- entity_name: Risk Assessment
  description: Safety, effectiveness, regulatory, and overall risk assessment for
    a drug.
- entity_name: Release Decision
  description: The decision showing whether a drug is ready for market release.
business_relationships:
- relationship_name: Company develops Drug Candidates
  description: One pharmaceutical company can develop many drug candidates.
- relationship_name: Drug Candidate has Development Assessments
  description: One drug candidate can have many laboratory tests, animal studies,
    and clinical trials.
- relationship_name: Drug Candidate has Regulatory Records
  description: One drug candidate can have multiple regulatory submissions and licence
    records.
- relationship_name: Drug Candidate has Patents
  description: One drug candidate can be associated with one or more patents.
- relationship_name: Drug Candidate has Risk Assessments
  description: One drug candidate can have multiple risk assessments over time.
- relationship_name: Drug Candidate has Release Decisions
  description: One drug candidate can have multiple release-readiness decisions over
    time.
