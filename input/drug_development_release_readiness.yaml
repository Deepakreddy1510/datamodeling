  - drug_id
  - patent_title
  - patent_owner
  - patent_authority
  - filing_date
  - grant_date
  - expiry_date
  - patent_status
  Risk Assessment:
  - risk_assessment_id
  - drug_id
  - assessment_date
  - safety_risk
  - effectiveness_risk
  - regulatory_risk
  - manufacturing_risk
  - overall_risk
  - risk_reason
  - mitigation_action
  Release Decision:
  - release_decision_id
  - drug_id
  - decision_date
  - release_readiness
  - release_decision
  - blocking_reason
  - next_action
business_rules:
- Every development assessment must belong to a valid drug candidate
- A drug cannot enter clinical trials until required preclinical assessments pass
- Clinical trials should progress from Phase I to Phase II to Phase III
- A failed mandatory assessment blocks progression
- Overall risk must be Low, Medium, High, or Critical
- A drug with unresolved Critical risk cannot be released
- A drug cannot be released without regulatory approval
- A drug cannot be released without an active marketing licence
- Completion dates cannot be earlier than start dates
- Release decisions must include a blocking reason when the drug is not ready
reporting_requirements:
- report_name: Drug Development Status Report
  description: Show each drug, developing company, current stage, and development
    status.
- report_name: Development Assessment Report
  description: Show laboratory tests, animal studies, clinical trials, completed assessments,
    pending assessments, and results.
- report_name: Safety and Risk Report
  description: Show safety, effectiveness, regulatory, manufacturing, and overall
    risk levels.
- report_name: Regulatory and Licence Report
  description: Show regulatory submission, review, approval, and marketing licence
    status.
- report_name: Patent Status Report
  description: Show patent owner, patent authority, patent status, and expiry date.
- report_name: Drug Release Readiness Report
  description: Show whether each drug can be released, the blocking reason, and the
    next required action.
synthetic_data_requirements:
  rows_per_table: 5
  locale: en_GB
  country: United Kingdom
  generation_engine: codex-cli
  value_quality_rules:
  - Generate meaningful fictional pharmaceutical companies and drug names
  - Generate realistic assessment, study, and trial names
  - Do not use placeholders such as Drug 001 or Clinical Trial 001
  - Keep related values logically consistent
  - Use valid dates, numbers, statuses, phases, and risk levels
  - Do not make factual claims about real medicines or real companies
  - Clearly treat generated records as synthetic demonstration data
  - Keep all generated text values under 30 characters unless the field is a description,
    reason, finding, mitigation action, or next action.
  - For Regulatory Record, use short regulator_name values such as MHRA, EMA, FDA,
    TGA, or Health Canada.
  - For Regulatory Record, use short record_type values only from Submission, Approval,
    Licence, Review, Renewal.
  - For Regulatory Record, use short submission_type values only from Initial, Variation,
    Renewal, Safety, Fast Track.
  - For Regulatory Record, use short review_status values only from Submitted, In
    Review, Approved, Rejected, Withdrawn.
  - For Regulatory Record, use short decision_result values only from Approved, Rejected,
    Pending, Conditional.
  - For Regulatory Record, use short licence_status values only from Active, Pending,
    Expired, Suspended, None.
  - Avoid long values such as Marketing Authorisation Application, Conditional Marketing
    Licence, Regulatory Review In Progress, or Licence Pending Final Approval.
expected_output:
- Conceptual data model
- Logical data model
- Physical PostgreSQL data model
- SQL DDL scripts
- Table relationships
- Fact and dimension design
- Synthetic data generation support
- Excel output with sample synthetic data
- PostgreSQL loading support
