business_name: TimeCraft Online Watch Store

business_type: Online Watch Retail and E-Commerce

target_database: PostgreSQL

business_description: >
  TimeCraft is an online watch shopping platform where customers browse watches,
  compare collections, place orders, make payments, receive shipments, and request
  returns or warranty support. The business sells watches across different brands,
  collections, styles, genders, strap materials, dial colors, and price ranges.
  The company wants better visibility into sales, customer behavior, product demand,
  inventory availability, payment success, shipment performance, returns, and warranty
  claims.

model_purpose: >
  Create a PostgreSQL analytical data model that helps the business analyze online
  watch sales, customer purchase behavior, product and brand performance, inventory
  availability, order fulfillment, payment outcomes, shipment performance, returns,
  and warranty service trends. The model should support business reporting,
  operational analysis, and synthetic data generation for testing.

main_business_processes:
  - Customer registration and profile management
  - Watch product catalog management
  - Brand and collection management
  - Online product browsing
  - Inventory availability tracking
  - Shopping cart and order placement
  - Order item tracking
  - Payment processing
  - Shipment and delivery tracking
  - Return request handling
  - Warranty registration and claim tracking
  - Customer purchase history analysis
  - Sales and product performance reporting

key_business_entities:
  - entity_name: Customer
    description: A person who registers on the online watch store and places watch orders.

  - entity_name: Watch Product
    description: A watch item available for sale on the website.

  - entity_name: Brand
    description: A watch brand sold through the online store.

  - entity_name: Collection
    description: A product collection or watch series grouped under a brand.

  - entity_name: Inventory
    description: Stock availability for watch products by warehouse or fulfillment location.

  - entity_name: Warehouse
    description: A fulfillment location that stores inventory and ships customer orders.

  - entity_name: Order
    description: A purchase request placed by a customer.

  - entity_name: Order Item
    description: A watch product line item inside a customer order.

  - entity_name: Payment
    description: Payment transaction information related to a customer order.

  - entity_name: Shipment
    description: Shipment and delivery tracking details for a customer order.

  - entity_name: Return Request
    description: A customer request to return one or more ordered watch products.

  - entity_name: Warranty Claim
    description: Warranty registration or service claim raised for a purchased watch.

business_relationships:
  - relationship_name: Customer places Orders
    description: One customer can place many orders.

  - relationship_name: Order contains Order Items
    description: One order can contain many order items.

  - relationship_name: Watch Product appears in Order Items
    description: One watch product can appear in many order items.

  - relationship_name: Brand has Watch Products
    description: One brand can have many watch products.

  - relationship_name: Collection has Watch Products
    description: One collection can include many watch products.

  - relationship_name: Warehouse stores Inventory
    description: One warehouse can store inventory for many watch products.

  - relationship_name: Watch Product has Inventory
    description: One watch product can have inventory records across warehouses.

  - relationship_name: Order has Payment
    description: Each order should have payment transaction information.

  - relationship_name: Order has Shipment
    description: Each order should have shipment and delivery tracking information.

  - relationship_name: Order Item can have Return Request
    description: One order item may have a return request if the customer returns the product.

  - relationship_name: Order Item can have Warranty Claim
    description: One order item may have a warranty claim after purchase.

