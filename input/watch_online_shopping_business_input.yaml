business_rules:
  - Order total amount should equal the sum of order item line total amounts before discounts.
  - Net order amount should equal order total amount minus discount amount.
  - Order item line total amount should equal quantity multiplied by unit price minus item discount amount.
  - Payment amount should match the net order amount for successful payments.
  - Available inventory quantity should not be negative.
  - Reserved inventory quantity should not be negative.
  - Product unit price should be greater than zero.
  - Order quantity should be greater than zero.
  - Shipment promised delivery date should be on or after the order date.
  - Delivered shipments should have an actual delivery date.
  - Delivery delay days should be zero or positive.
  - Refund amount should not exceed the related order item line total amount.
  - Warranty claim service cost should not be negative.
  - Return requested date should be on or after the order date.
  - Active status fields should be boolean values.

reporting_requirements:
  - report_name: Daily Watch Sales Report
    description: Show daily order count, quantity sold, gross sales, discounts, and net sales.

  - report_name: Product Performance Report
    description: Show sales by watch product, brand, collection, category, movement type, strap material, and dial color.

  - report_name: Customer Segment Report
    description: Show orders, revenue, average order value, and repeat purchases by customer segment and city.

  - report_name: Brand and Collection Report
    description: Show revenue, units sold, and average selling price by brand and collection.

  - report_name: Inventory Availability Report
    description: Show available quantity, reserved quantity, reorder risk, and inventory status by product and warehouse.

  - report_name: Payment Status Report
    description: Show successful, failed, pending, and refunded payments by payment method and order channel.

  - report_name: Shipment Performance Report
    description: Show shipment status, delayed shipments, average delivery delay, and courier performance.

  - report_name: Return Analysis Report
    description: Show return count, return reasons, refund amount, and return rate by product, brand, and category.

  - report_name: Warranty Claim Report
    description: Show warranty claim count, claim reasons, service cost, and claim status by product and brand.

expected_model_layers:
  - Raw/load tables with names starting with load_ for source ingestion.
  - Staging tables with names starting with stg_ for cleaned operational data.
  - Dimension tables with names starting with dim_ for customers, products, brands, collections, warehouses, dates, payment methods, shipment partners, and statuses.
  - Fact tables with names starting with fact_ for orders, order items, payments, shipments, inventory snapshots, returns, and warranty claims.
  - Reporting views with names starting with reporting_ for business analytics.

grain_expectations:
  - Fact Order should have one row per customer order.
  - Fact Order Item should have one row per product line item inside an order.
  - Fact Payment should have one row per payment transaction.
  - Fact Shipment should have one row per shipment.
  - Fact Inventory Snapshot should have one row per product per warehouse per stock update date.
  - Fact Return should have one row per return request.
  - Fact Warranty Claim should have one row per warranty claim.

expected_output:
  - Conceptual data model
  - Logical data model
  - Physical PostgreSQL data model
  - Raw/load tables with load_ prefix
  - Staging tables with stg_ prefix
  - Dimension tables with dim_ prefix
  - Fact tables with fact_ prefix
  - Reporting views with reporting_ prefix
  - SQL DDL scripts
  - Table relationships
  - Primary keys and foreign keys
  - Business rules and constraints
  - Fact grain explanation
  - AI additions and assumptions
  - Synthetic data generation support
  - Excel output with sample synthetic data
  - PostgreSQL loading support

database_design_preferences:
  - Use PostgreSQL compatible DDL.
  - Use clear primary keys and foreign keys.
  - Use surrogate keys for dimension and fact tables where suitable.
  - Use business keys to connect staging tables to dimensions.
  - Use meaningful constraints for dates, amounts, quantities, statuses, and calculated values.
  - Do not apply unique constraints to low-cardinality descriptive fields such as status, category, city, region, color, material, movement type, payment method, courier partner, and boolean flags.
  - Keep the model simple enough for analytics and reporting.