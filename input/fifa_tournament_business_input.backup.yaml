    - start_date
    - end_date
    - is_active

reporting_requirements:
  - report_name: Match Performance Report
    description: Show match results, goals scored, attendance, match revenue, and match status by stage and venue.

  - report_name: Team Performance Report
    description: Show wins, losses, draws, goals scored, goals conceded, points, and progression by team.

  - report_name: Player Performance Report
    description: Show goals, assists, cards, minutes played, starts, and captain appearances by player and team.

  - report_name: Venue Utilization Report
    description: Show matches hosted, attendance, capacity utilization, and revenue by venue and city.

  - report_name: Ticket Revenue Report
    description: Show tickets sold, ticket revenue, and average ticket price by match, category, venue, and stage.

  - report_name: Broadcast Viewership Report
    description: Show viewers, platform type, broadcaster, region, and broadcast revenue by match and stage.

  - report_name: Sponsorship Revenue Report
    description: Show sponsorship contract value by sponsor category, competition, and active contract status.

  - report_name: Referee Assignment Report
    description: Show referee assignments, roles, experience, and match count by official.

expected_output:
  - Conceptual data model
  - Logical data model
  - Physical PostgreSQL data model
  - SQL DDL scripts
  - Load tables
  - Staging tables
  - Dimension tables
  - Fact tables
  - Reporting views
  - Table relationships
  - Synthetic data generation support
  - Excel output with sample synthetic data
  - PostgreSQL loading support

modeling_guidelines:
  unique_constraints:
    use_unique_only_for:
      - primary keys
      - true business identifiers
      - competition_id
      - team_id
      - player_id
      - venue_id
      - match_id
      - event_id
      - referee_id
      - ticket_sale_id
      - broadcast_id
      - sponsorship_id

    never_unique_for_low_cardinality_fields:
      - competition_status
      - match_status
      - match_stage
      - event_type
      - event_outcome
      - position
      - preferred_foot
      - confederation
      - country
      - city
      - stadium_type
      - referee_role
      - official_role
      - ticket_category
      - platform_type
      - sponsor_category
      - is_active
      - starting_eleven_flag
      - captain_flag

semantic_data_context:
  domain: football_tournament_analytics
  competition_entity: Competition
  team_entity: Team
  player_entity: Player
  venue_entity: Venue
  match_entity: Match
  match_participation_entity: Match Squad
  event_entity: Match Event
  referee_entity: Referee
  ticket_entity: Ticket Sale
  broadcast_entity: Broadcast Viewership
  sponsorship_entity: Sponsorship

synthetic_data_requirements:
  realism_level: high
  locale: en_US

  date_range:
    start_date: "2024-01-01"
    end_date: "2026-12-31"

  consistency_rules:
    competition:
      end_date_should_be_after_start_date: true

    team:
      team_country_should_match_confederation: true
      is_active_should_be_boolean: true

    player:
      player_team_should_exist: true
      jersey_number_should_be_between_1_and_99: true
      is_active_should_be_boolean: true

    venue:
      capacity_should_be_positive: true
      venue_city_should_match_country: true

    match:
      match_date_should_be_within_competition_dates: true
      home_team_and_away_team_should_be_different: true
      attendance_should_not_exceed_venue_capacity: true
      scores_should_be_non_negative: true

    match_squad:
      player_should_belong_to_match_team: true
      minutes_played_should_be_between_0_and_120: true
      starting_eleven_flag_should_be_boolean: true
      captain_flag_should_be_boolean: true

    match_event:
      event_minute_should_be_between_0_and_120: true
      event_player_should_belong_to_match_team: true

    ticket_sale:
      sale_amount_should_equal_tickets_sold_times_ticket_price: true
      sale_date_should_be_on_or_before_match_date: true

    broadcast:
      viewers_count_should_be_positive: true
      broadcast_revenue_should_be_positive: true

    sponsorship:
      contract_amount_should_be_positive: true
      end_date_should_be_after_start_date: true
      is_active_should_be_boolean: true

    relationships:
      enforce_primary_keys: true
      enforce_foreign_keys: true
      enforce_unique_constraints: true
      enforce_check_constraints: true

