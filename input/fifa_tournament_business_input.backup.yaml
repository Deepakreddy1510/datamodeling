business_name: Global Football Championship Analytics

business_type: International Football Tournament Operations and Performance Analytics

target_database: PostgreSQL

business_description: >
  Global Football Championship Analytics is a tournament analytics platform for
  managing and analyzing international football competitions. The business wants
  visibility into teams, players, venues, matches, match events, referee assignments,
  ticket sales, broadcast viewership, sponsorship revenue, player performance,
  team performance, attendance, and tournament operations.

model_purpose: >
  Create a data model that helps tournament organizers analyze match performance,
  team standings, player statistics, venue utilization, ticket revenue, broadcast
  revenue, sponsorship value, referee assignments, match events, and fan attendance.
  The model should support analytical reporting, synthetic data generation, Excel
  output, and PostgreSQL loading.

main_business_processes:
  - Tournament and competition setup
  - Team registration and squad management
  - Player profile and roster management
  - Venue and stadium scheduling
  - Match scheduling and match operations
  - Match event tracking
  - Referee and official assignment
  - Ticket sales and attendance tracking
  - Broadcast viewership tracking
  - Sponsorship contract tracking
  - Team, player, and tournament performance reporting

key_business_entities:
  - entity_name: Competition
    description: A football tournament or championship season.

  - entity_name: Team
    description: A national or club football team participating in the competition.

  - entity_name: Player
    description: A football player registered with a participating team.

  - entity_name: Venue
    description: A stadium or football venue where matches are played.

  - entity_name: Match
    description: A football match between two teams in the competition.

  - entity_name: Match Squad
    description: A player's participation record for a specific match.

  - entity_name: Match Event
    description: An in-game event such as goal, assist, yellow card, red card, substitution, or penalty.

  - entity_name: Referee
    description: A match official assigned to tournament matches.

  - entity_name: Match Official
    description: Assignment of referees and officials to a specific match.

  - entity_name: Ticket Sale
    description: Ticket sales and revenue information for a match.

  - entity_name: Broadcast Viewership
    description: Broadcast audience and revenue information for a match.

  - entity_name: Sponsorship
    description: Sponsorship contracts connected to the competition.

business_relationships:
  - relationship_name: Competition has Teams
    description: One competition can include many participating teams.

  - relationship_name: Team has Players
    description: One team can have many registered players.

  - relationship_name: Competition schedules Matches
    description: One competition can schedule many matches.

  - relationship_name: Venue hosts Matches
    description: One venue can host many matches.

  - relationship_name: Match has Home Team
    description: Each match has one home team.

  - relationship_name: Match has Away Team
    description: Each match has one away team.

  - relationship_name: Match has Match Squads
    description: One match can include many player participation records.

  - relationship_name: Match has Match Events
    description: One match can have many recorded match events.

  - relationship_name: Player creates Match Events
    description: One player can be linked to many match events.

  - relationship_name: Match has Officials
    description: One match can have many assigned officials.

  - relationship_name: Match has Ticket Sales
    description: One match can have many ticket sale records.

  - relationship_name: Match has Broadcast Viewership
    description: One match can have many broadcast viewership records.

  - relationship_name: Competition has Sponsorships
    description: One competition can have many sponsorship contracts.

