business_name: FreshCart Online Grocery
business_type: Online Grocery Delivery
target_database: PostgreSQL

business_description: >
  FreshCart is an online grocery delivery business where customers use a mobile app
  or website to browse grocery products, place orders, make payments, and receive
  deliveries from nearby stores. The business wants to improve visibility into
  sales, customer behavior, product demand, payment success, and delivery performance.

model_purpose: >
  Create a PostgreSQL analytical warehouse data model that supports reporting on
  customers, products, stores, orders, order items, payments, and deliveries.
  The output must include a conceptual model, logical model, physical PostgreSQL DDL,
  table relationships, synthetic data generation support, Excel output support,
  and PostgreSQL loading support.

warehouse_model_requirements:
  schemas:
    - raw
    - stg
    - dw
    - rpt

  layers:
    raw:
      purpose: Store raw source payloads from operational systems.
    staging:
      purpose: Store typed source-aligned data with primary keys, foreign keys, check constraints, and business validations.
    dimensions:
      purpose: Store analytical dimensions with surrogate keys and business keys.
    facts:
      purpose: Store measurable business events for orders, products, payments, and deliveries.
    reporting:
      purpose: Provide SQL reporting views for business users.

main_business_processes:
  - Customer registration and profile management
  - Product catalog management
  - Store and fulfillment location management
  - Customer order placement
  - Order item selection
  - Payment processing
  - Delivery tracking
  - Customer order history analysis
  - Product demand analysis
  - Store performance analysis
  - Payment success analysis
  - Delivery performance analysis

key_business_entities:
  - entity_name: Customer
    description: A registered customer who places grocery orders through the app or website.

  - entity_name: Product
    description: A grocery product available for purchase.

  - entity_name: Store
    description: A store or fulfillment location that prepares customer orders.

  - entity_name: Order
    description: A purchase transaction placed by a customer and fulfilled by a store.

  - entity_name: Order Item
    description: A line item inside an order representing a purchased product and quantity.

  - entity_name: Payment
    description: Payment transaction details for an order.

  - entity_name: Delivery
    description: Delivery assignment, status, promised time, actual time, and delay information for an order.

business_relationships:
  - relationship_name: Customer places Orders
    description: One customer can place many orders.
    cardinality: Customer 1:M Order
    parent_entity: Customer
    child_entity: Order
    join_key: customer_id

  - relationship_name: Store fulfills Orders
    description: One store can fulfill many orders.
    cardinality: Store 1:M Order
    parent_entity: Store
    child_entity: Order
    join_key: store_id

  - relationship_name: Order contains Order Items
    description: One order can contain many order items.
    cardinality: Order 1:M Order Item
    parent_entity: Order
    child_entity: Order Item
    join_key: order_id

  - relationship_name: Product appears in Order Items
    description: One product can appear in many order items.
    cardinality: Product 1:M Order Item
    parent_entity: Product
    child_entity: Order Item
    join_key: product_id

  - relationship_name: Order has Payment
    description: Each order has one payment transaction record.
    cardinality: Order 1:1 Payment
    parent_entity: Order
    child_entity: Payment
    join_key: order_id

  - relationship_name: Order has Delivery
    description: Each order has one delivery tracking record.
    cardinality: Order 1:1 Delivery
    parent_entity: Order
    child_entity: Delivery
    join_key: order_id

entity_attributes:
  Customer:
    - name: customer_id
      data_type: varchar
      max_length: 50
      required: true
      primary_key: true
      semantic_type: business_key
      format: CUSTOMER-000001

    - name: customer_name
      data_type: varchar
      max_length: 200
      required: true
      semantic_type: person_name

    - name: email
      data_type: varchar
      max_length: 200
      required: true
      unique: true
      semantic_type: email

    - name: phone
      data_type: varchar
      max_length: 30
      required: true
      semantic_type: phone_number

    - name: city
      data_type: varchar
      max_length: 100
      required: true
      semantic_type: city
      allowed_values:
        - Bengaluru
        - Hyderabad
        - Chennai
        - Mumbai
        - Pune
        - Delhi
        - Kolkata
        - Ahmedabad

    - name: customer_segment
      data_type: varchar
      max_length: 30
      required: true
      allowed_values:
        - Regular
        - Premium
        - Family
        - Student
        - Senior
        - Corporate

    - name: signup_date
      data_type: date
      required: true
      min_date: "2023-01-01"
      max_date: "2026-12-31"

    - name: is_active
      data_type: boolean
      required: true
      default: true

  Product:
    - name: product_id
      data_type: varchar
      max_length: 50
      required: true
      primary_key: true
      semantic_type: business_key
      format: PRODUCT-000001

    - name: product_name
      data_type: varchar
      max_length: 200
      required: true
      semantic_type: grocery_product_name

    - name: product_category
      data_type: varchar
      max_length: 50
      required: true
      allowed_values:
        - Fruits
        - Vegetables
        - Dairy
        - Bakery
        - Beverages
        - Snacks
        - Staples
        - Frozen Foods
        - Personal Care
        - Household

    - name: brand
      data_type: varchar
      max_length: 100
      required: true
      semantic_type: grocery_brand

    - name: unit_price
      data_type: numeric
      precision: 10
      scale: 2
      required: true
      min_value: 5.00
      max_value: 5000.00

    - name: is_active
      data_type: boolean
      required: true
      default: true

  Store:
    - name: store_id
      data_type: varchar
      max_length: 50
      required: true
      primary_key: true
      semantic_type: business_key
      format: STORE-000001

    - name: store_name
      data_type: varchar
      max_length: 200
      required: true
      semantic_type: store_name

    - name: city
      data_type: varchar
      max_length: 100
      required: true
      allowed_values:
        - Bengaluru
        - Hyderabad
        - Chennai
        - Mumbai
        - Pune
        - Delhi
        - Kolkata
        - Ahmedabad

    - name: region
      data_type: varchar
      max_length: 50
      required: true
      allowed_values:
        - North
        - South
        - East
        - West
        - Central

    - name: store_type
      data_type: varchar
      max_length: 50
      required: true
      allowed_values:
        - Dark Store
        - Supermarket
        - Hypermarket
        - Partner Store
        - Express Fulfillment Center

    - name: is_active
      data_type: boolean
      required: true
      default: true

  Order:
    - name: order_id
      data_type: varchar
      max_length: 50
      required: true
      primary_key: true
      semantic_type: business_key
      format: ORDER-000001

    - name: customer_id
      data_type: varchar
      max_length: 50
      required: true
      foreign_key:
        references_entity: Customer
        references_attribute: customer_id

    - name: store_id
      data_type: varchar
      max_length: 50
      required: true
      foreign_key:
        references_entity: Store
        references_attribute: store_id

    - name: order_date
      data_type: date
      required: true
      min_date: "2024-01-01"
      max_date: "2026-12-31"

    - name: order_status
      data_type: varchar
      max_length: 30
      required: true
      allowed_values:
        - Placed
        - Confirmed
        - Packed
        - Out for Delivery
        - Delivered
        - Cancelled
        - Returned

    - name: order_total_amount
      data_type: numeric
      precision: 14
      scale: 2
      required: true
      min_value: 0.00
      calculation_rule: Sum of line_total_amount for all order items belonging to the order.

  Order Item:
    - name: order_item_id
      data_type: varchar
      max_length: 50
      required: true
      primary_key: true
      semantic_type: business_key
      format: ORDERITEM-000001

    - name: order_id
      data_type: varchar
      max_length: 50
      required: true
      foreign_key:
        references_entity: Order
        references_attribute: order_id

    - name: product_id
      data_type: varchar
      max_length: 50
      required: true
      foreign_key:
        references_entity: Product
        references_attribute: product_id

    - name: quantity
      data_type: integer
      required: true
      min_value: 1
      max_value: 20

    - name: unit_price
      data_type: numeric
      precision: 10
      scale: 2
      required: true
      min_value: 5.00
      max_value: 5000.00

    - name: line_total_amount
      data_type: numeric
      precision: 14
      scale: 2
      required: true
      calculation_rule: quantity * unit_price

  Payment:
    - name: payment_id
      data_type: varchar
      max_length: 50
      required: true
      primary_key: true
      semantic_type: business_key
      format: PAYMENT-000001

    - name: order_id
      data_type: varchar
      max_length: 50
      required: true
      unique: true
      foreign_key:
        references_entity: Order
        references_attribute: order_id

    - name: payment_method
      data_type: varchar
      max_length: 30
      required: true
      allowed_values:
        - UPI
        - Credit Card
        - Debit Card
        - Net Banking
        - Wallet
        - Cash on Delivery

    - name: payment_status
      data_type: varchar
      max_length: 30
      required: true
      allowed_values:
        - Successful
        - Failed
        - Pending
        - Refunded

    - name: payment_amount
      data_type: numeric
      precision: 14
      scale: 2
      required: true
      min_value: 0.00
      calculation_rule: payment_amount should equal order_total_amount for successful payments.

    - name: payment_date
      data_type: date
      required: true
      rule: payment_date should be same as or after order_date.

  Delivery:
    - name: delivery_id
      data_type: varchar
      max_length: 50
      required: true
      primary_key: true
      semantic_type: business_key
      format: DELIVERY-000001

    - name: order_id
      data_type: varchar
      max_length: 50
      required: true
      unique: true
      foreign_key:
        references_entity: Order
        references_attribute: order_id

    - name: delivery_partner
      data_type: varchar
      max_length: 100
      required: true
      allowed_values:
        - FreshCart Fleet
        - QuickMove
        - SpeedKart
        - Local Runner
        - Partner Courier

    - name: delivery_status
      data_type: varchar
      max_length: 30
      required: true
      allowed_values:
        - Assigned
        - Picked Up
        - In Transit
        - Delivered
        - Delayed
        - Failed
        - Cancelled

    - name: promised_delivery_time
      data_type: timestamp
      required: true

    - name: actual_delivery_time
      data_type: timestamp
      required: false

    - name: delivery_delay_minutes
      data_type: integer
      required: true
      min_value: 0
      max_value: 240
      calculation_rule: >
        Difference in minutes between actual_delivery_time and promised_delivery_time.
        If actual_delivery_time is before promised_delivery_time, delay should be 0.

