synthetic_data_generation_requirements:
  row_counts:
    customers: 50
    products: 40
    stores: 10
    orders: 100
    order_items: 200
    payments: 100
    deliveries: 100

  realism_rules:
    - Customer names should be realistic person names.
    - Emails should be realistic and should match customer names where possible.
    - Phone numbers should be valid-looking phone numbers.
    - City values should come from the reference city list.
    - Store names should look like grocery store or fulfillment center names, not person names.
    - Product names should come from grocery product reference data.
    - Product category should match product name where possible.
    - Brand values should come from grocery brand reference data.
    - Order statuses should come only from the allowed order status list.
    - Payment methods should come only from the allowed payment method list.
    - Payment statuses should come only from the allowed payment status list.
    - Delivery statuses should come only from the allowed delivery status list.
    - Boolean columns should use true or false only.
    - Date columns should contain real dates only.
    - Timestamp columns should contain real timestamps only.
    - Numeric columns should contain numeric values only.
    - Integer columns should contain integer values only.
    - No placeholder values such as "Customer 001", "Product 001", "Value 001", "Unknown", or "Synthetic FreshCart ..." should appear in business descriptive columns.

  relationship_rules:
    - Every order must reference an existing customer_id.
    - Every order must reference an existing store_id.
    - Every order item must reference an existing order_id.
    - Every order item must reference an existing product_id.
    - Every payment must reference an existing order_id.
    - Every delivery must reference an existing order_id.
    - Each order should have at least one order item.
    - Each order should have one payment.
    - Each order should have one delivery.

  calculation_rules:
    - Order Item line_total_amount must equal quantity * unit_price.
    - Order order_total_amount must equal the sum of line_total_amount for that order.
    - Payment payment_amount should equal order_total_amount when payment_status is Successful.
    - Delivery delivery_delay_minutes must be 0 when actual_delivery_time is on or before promised_delivery_time.
    - Delivery delivery_delay_minutes must be positive when actual_delivery_time is after promised_delivery_time.

  date_rules:
    - signup_date should be between 2023-01-01 and 2026-12-31.
    - order_date should be between 2024-01-01 and 2026-12-31.
    - payment_date should be same as or after order_date.
    - promised_delivery_time should be same day or after order_date.
    - actual_delivery_time should be same as or after promised_delivery_time for delayed deliveries.
    - actual_delivery_time can be same as or before promised_delivery_time for on-time deliveries.

  value_constraints:
    - quantity must be between 1 and 20.
    - unit_price must be greater than or equal to 5.00.
    - line_total_amount must be greater than or equal to 0.
    - order_total_amount must be greater than or equal to 0.
    - payment_amount must be greater than or equal to 0.
    - delivery_delay_minutes must be between 0 and 240.

physical_model_requirements:
  staging_tables:
    - stg_customer
    - stg_product
    - stg_store
    - stg_order
    - stg_order_item
    - stg_payment
    - stg_delivery

  dimension_tables:
    - dim_date
    - dim_customer
    - dim_product
    - dim_store
    - dim_payment_method
    - dim_delivery_partner

  fact_tables:
    - fact_order
    - fact_order_item
    - fact_payment
    - fact_delivery

  required_constraints:
    - Primary keys on all staging, dimension, and fact tables.
    - Foreign keys between staging tables based on business relationships.
    - Foreign keys from facts to dimensions.
    - CHECK constraints for all status, category, method, type, and segment columns.
    - CHECK constraints for numeric ranges.
    - CHECK constraints for non-negative amount columns.
    - CHECK constraints for date ordering where applicable.
    - Unique constraints for business keys in dimensions.

reporting_requirements:
  - report_name: Daily Sales Report
    description: Show daily order count, sales amount, and quantity sold.
    required_metrics:
      - order_count
      - total_sales_amount
      - total_quantity_sold
      - average_order_value
    dimensions:
      - order_date
      - city
      - store

  - report_name: Product Sales Report
    description: Show sales by product, category, and brand.
    required_metrics:
      - quantity_sold
      - gross_sales_amount
      - order_count
    dimensions:
      - product_name
      - product_category
      - brand

  - report_name: Customer Segment Report
    description: Show orders and sales by customer segment and city.
    required_metrics:
      - customer_count
      - order_count
      - total_sales_amount
      - average_order_value
    dimensions:
      - customer_segment
      - city

  - report_name: Payment Status Report
    description: Show successful, failed, pending, and refunded payments.
    required_metrics:
      - payment_count
      - payment_amount
    dimensions:
      - payment_status
      - payment_method
      - payment_date

  - report_name: Delivery Performance Report
    description: Show delivery status, delayed orders, and average delivery delay.
    required_metrics:
      - delivery_count
      - delayed_delivery_count
      - average_delivery_delay_minutes
    dimensions:
      - delivery_status
      - delivery_partner
      - city

expected_output:
  - Conceptual data model
  - Logical data model
  - Physical PostgreSQL data model
  - SQL DDL scripts
  - Raw load tables
  - Staging tables
  - Dimension tables
  - Fact tables
  - Reporting views
  - Table relationships
  - Synthetic data generation support
  - Excel output with sample synthetic data
  - PostgreSQL loading support

quality_gate_requirements:
  - Generated PostgreSQL DDL must be valid.
  - Generated synthetic data must pass datatype validation.
  - Generated synthetic data must pass primary key and foreign key validation.
  - Generated synthetic data must pass CHECK constraint validation.
  - Generated synthetic data must pass calculation validation.
  - Generated synthetic data must pass date rule validation.
  - Generated synthetic data must pass boolean rule validation.
  - Generated synthetic data must not contain generic placeholder values in business columns.
  - Generated Excel should be suitable for PostgreSQL loading.