key_business_entities:
<<<<<<< HEAD
  - entity_name: Airport
    description: An airport used as the origin or destination of a flight route.

  - entity_name: Route
    description: A travel path between an origin airport and a destination airport.

  - entity_name: Aircraft
    description: An aircraft in the Air India fleet that operates scheduled flights.

  - entity_name: Aircraft Configuration
    description: The effective cabin seat configuration assigned to an aircraft.

  - entity_name: Flight
    description: A scheduled flight operating on a route using an aircraft and cabin configuration.

  - entity_name: Cabin Class
    description: A travel cabin category such as Economy, Premium Economy, or Business Class.

  - entity_name: Booking
    description: A passenger reservation made for a specific flight and cabin class.

  - entity_name: Flight Cabin Inventory
    description: Cabin-level seat availability and utilization for a particular flight.

business_relationships:
  - relationship_name: Airport defines Routes
    description: One airport can be the origin or destination of many routes.

  - relationship_name: Route contains Flights
    description: One route can have many scheduled flights.

  - relationship_name: Aircraft has Configurations
    description: One aircraft can have multiple effective-dated cabin configurations over time.

  - relationship_name: Aircraft operates Flights
    description: One aircraft can operate many flights on different dates.

  - relationship_name: Aircraft Configuration applies to Flights
    description: Each flight uses one aircraft cabin configuration that belongs to the assigned aircraft.

  - relationship_name: Flight belongs to Route
    description: Each flight operates on one route.

  - relationship_name: Flight has Bookings
    description: One flight can have many passenger bookings.

  - relationship_name: Cabin Class appears in Bookings
    description: One cabin class can be selected by many bookings.

  - relationship_name: Flight has Cabin Inventory
    description: One flight should have one cabin inventory record for each available cabin class.

  - relationship_name: Cabin Class appears in Flight Cabin Inventory
    description: One cabin class can appear in the cabin inventory of many flights.

