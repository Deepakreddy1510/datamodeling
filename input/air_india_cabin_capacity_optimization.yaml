reporting_requirements:
  - report_name: Route Revenue Performance
    description: >
      Show flight count, passenger demand, booked seats, gross revenue, net revenue,
      average ticket price, and revenue per available seat by route, flight date,
      region, and cabin class.

  - report_name: Cabin Load Factor Analysis
    description: >
      Show available seats, booked seats, remaining seats, cancelled seats,
      waitlisted seats, cabin load factor, and revenue per available seat for each
      flight and cabin class.

  - report_name: Booking Lead Time Analysis
    description: >
      Show booking count, passenger count, average ticket price, gross revenue, and
      net revenue by booking lead days, fare category, cabin class, booking channel,
      and passenger segment.

  - report_name: Aircraft Utilization Analysis
    description: >
      Show flight count, assigned routes, available seats, booked seats, total
      revenue, load factor, and revenue per seat by aircraft and flight date.

  - report_name: Seasonal Demand Analysis
    description: >
      Show booking volume, passenger demand, booked seats, average ticket price,
      net revenue, and cabin load factor by month, season, route, and cabin class.

  - report_name: Cancellation and Refund Analysis
    description: >
      Show cancelled bookings, refunded bookings, cancellation amount, refund
      amount, lost revenue, and net revenue by route, cabin class, fare category,
      and booking channel.

  - report_name: Cabin Capacity Recommendation
    description: >
      Identify constrained and underutilized cabins using available seats, booked
      seats, remaining seats, cabin load factor, net revenue, and revenue per
      available seat, and recommend whether to increase, maintain, rebalance, or
      reduce cabin capacity.
